name: CI/CD PIPELINE

on:
  workflow_dispatch:
    inputs:
      target_job:
        description: 'Sélectionnez le job à tester'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - setup
          - install
          - lint
          - test
          - build
          - build-artifact
          - docker-build
          - docker-push
          - integration-test

defaults:
  run:
    working-directory: ./chatbot


env:
  PROJECT_NAME: "Chatbot-LLM"
  PROJECT_CATEGORY: "IA"

  
jobs:
# 1. SETUP - Préparation de l'environnement
  setup:
    if: github.event.inputs.target_job == 'setup' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: python3 --version

# 2. INSTALL - Dépendances
  install:
    needs: [setup]
    if: always() && (github.event.inputs.target_job == 'install' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt ruff pytest --break-system-packages

# 3. LINT - Vérification de syntaxe 
  lint:
    needs: [install]
    if: always() && (github.event.inputs.target_job == 'lint' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: /home/medyassine/.local/bin/ruff check .

# 4. TEST - Vérification 
  test:
    needs: [lint]
    if: always() && (github.event.inputs.target_job == 'test' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ || true

# 5. BUILD - Compilation
  build:
    needs: [test]
    if: always() && (github.event.inputs.target_job == 'build' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m compileall app/

# 6. BUILD-ARTIFACT - Packaging
  build-artifact:
    needs: [build]
    if: always() && (github.event.inputs.target_job == 'build-artifact' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Create Deployment Package
        run: |
          mkdir -p dist
          tar -czvf dist/chatbot-artifact.tar.gz .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-package
          path: chatbot/dist/chatbot-artifact.tar.gz
          retention-days: 1

 # 7. DOCKER-BUILD simplifié pour ton Runner local
  docker-build:
    runs-on: self-hosted
    needs: [build-artifact]
    steps:
      - uses: actions/checkout@v4
      - name: Build Local Image
        run: |
         # Supprime l'image spécifique (remplace par ton nom d'image)
          docker rmi -f devops-bot:latest 2>/dev/null || true
          docker builder prune -f --filter "until=24h"
          docker build --no-cache -t  ${{ secrets.DOCKERHUB_USERNAME }}/devops-bot:latest .

# 8. DOCKER-PUSH simplifié
  docker-push:
    runs-on: self-hosted
    needs: [docker-build]
    steps:
      - name: Login and Push
        run: |
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
              docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-bot:latest

# 9. INTEGRATION-TEST - Validation dynamique
  integration-test:
    needs: [docker-push]
    if: always() && (github.event.inputs.target_job == 'integration-test' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Integration Test
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bot:latest
          CONTAINER_NAME: devops-bot-test-${{ github.run_id }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGTRACE_API_KEY: ${{ secrets.LANGTRACE_API_KEY }}
        run: |
          set -Eeuo pipefail
          # On injecte les variables du Runner dans un fichier physique
          echo "GROQ_API_KEY=${GROQ_API_KEY}" > .env.docker
          echo "LANGTRACE_API_KEY=${LANGTRACE_API_KEY}" >> .env.docker
          # Port aléatoire pour ton Latitude-5490
          PORT=$(shuf -i 20000-65000 -n 1)
          echo "Démarrage du conteneur $CONTAINER_NAME sur le port $PORT"
          
          docker rm -f $CONTAINER_NAME >/dev/null 2>&1 || true
          
          # Le Watcher va capturer cet événement 'start' instantanément !
          docker run -d \
            --name $CONTAINER_NAME \
            --env-file .env.docker \
            -p $PORT:8000 \
            $IMAGE
          
          sleep 10
          
          if [ "$(docker inspect -f '{{.State.Running}}' $CONTAINER_NAME)" == "true" ]; then
             echo "✅ Le Chatbot est opérationnel sur le port $PORT"
          else
             echo "❌ Échec du démarrage du conteneur"
             docker logs $CONTAINER_NAME
             exit 1
          fi
          rm .env.docker

      - name: Cleanup Test Container
        if: always()
        run: |
          CONTAINER_NAME="devops-bot-test-${{ github.run_id }}"
          echo "🧹 Nettoyage du conteneur $CONTAINER_NAME"
          docker rm -f $CONTAINER_NAME >/dev/null 2>&1 || true
          
  deploy-minikube:
    name: "Deploy to Minikube"
    needs: [integration-test]
    if: always() && (github.event.inputs.target_job == 'deploy-minikube' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create/Update K8s Secrets
        run: |
          kubectl create secret generic bot-secrets \
            --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=LANGTRACE_API_KEY="${{ secrets.LANGTRACE_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Kustomize
        run: |
          # On applique l'overlay minikube directement
          kubectl apply -k k8s/overlays/minikube
          
          # Force le pull de la nouvelle image même si le tag est 'latest'
          kubectl rollout restart deployment/devops-bot
          
          # Attente de la validation
          kubectl rollout status deployment/devops-bot --timeout=90s

      - name: Access URL
        run: |
          echo "🚀 Bot disponible sur :"
          minikube service devops-bot-service --url

