name: Calculator Service CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'calculator-python/**'
      - '.github/workflows/main.yml'

jobs:
  build-and-test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./calculator-python 
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: ../scripts/green_run.sh "Install_Deps" "pip install -r requirements.txt ruff pytest"

      - name: Build (Compile Bytecode)
        run: ../scripts/green_run.sh "Compile" "python -m compileall app/"

      - name: Static Code Analysis (Ruff)
        run: ../scripts/green_run.sh "Linter" "ruff check ."

      - name: Unit Tests (Pytest)
        run: ../scripts/green_run.sh "Pytest" "pytest tests/"
