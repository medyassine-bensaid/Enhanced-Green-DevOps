name: Calculator Service CI/CD - Energy Optimized
permissions:
  contents: read
  actions: read  

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./calculator-python
        

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Eco-CI
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          task: start-measurement
          geo-location: fr
          carbon-intensity: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # On "nettoie" le compteur ici pour que Setup Python ne pollue pas l'Installation
      - name: Baseline Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          task: get-measurement
          label: 'Setup-Environment'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff pytest
      
      - name: Get Installation Metrics
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          task: get-measurement
          label: 'Installation'

      - name: Build (Compile Bytecode)
        run: python -m compileall app/

      - name: Get Build Metrics
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          task: get-measurement
          label: 'Compile Bytecode'

      - name: Static Code Analysis (Ruff)
        run: ruff check .

      - name: Get Linting Metrics
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          task: get-measurement
          label: 'Linter (Ruff)'

      - name: Unit Tests (Pytest)
        run: pytest tests/

      - name: Get Test Metrics
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          task: get-measurement
          label: 'Tests (Pytest)'

      - name: Finalize & Display Results
        if: always()
        uses: green-coding-solutions/eco-ci-energy-estimation@v4
        with:
          task: display-results
          send-data: true
          branch: main # Bien aligné sous "with"
          json-output: true # Bien aligné sous "with"
          calculate-co2: false # Bien aligné sous "with"
     
