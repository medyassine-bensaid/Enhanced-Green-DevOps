name: Calculator CI - Full Manual Testing

on:
  workflow_dispatch:
    inputs:
      target_job:
        description: 'Sélectionnez le job à tester'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - setup
          - install
          - build
          - lint
          - test
          - docker-build
          - docker-push

defaults:
  run:
    working-directory: ./chatbot

jobs:
# -----------------------
  setup:
    if: github.event.inputs.target_job == 'setup' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: python3 --version

# -----------------------
  install:
    if: github.event.inputs.target_job == 'install' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: pip install -r requirements.txt ruff pytest --break-system-packages

# -----------------------
  build:
    if: github.event.inputs.target_job == 'build' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: python3 -m compileall app/

# -----------------------
  lint:
    if: github.event.inputs.target_job == 'lint' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: /home/medyassine/.local/bin/ruff check .

# -----------------------
  test:
    if: github.event.inputs.target_job == 'test' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ || true

# -----------------------
  docker-build:
    if: github.event.inputs.target_job == 'docker-build' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest .

# -----------------------
  docker-push:
    if: github.event.inputs.target_job == 'docker-push' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
